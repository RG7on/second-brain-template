name: gate
# The brain's second door + dead-man pulse.
# - On every push: re-run the content gate (lint + gitleaks) server-side, so
#   nothing that slipped past a local hook (or a --no-verify) lands unnoticed.
# - Daily: fail loudly if no commit reached GitHub in 3 days — a failing
#   scheduled run makes GitHub email the owner, which is the off-machine
#   signal that backup has silently stopped.
#   (Note: GitHub pauses scheduled workflows after ~60 days of repo
#   inactivity; the nightly local doctor remains the primary alarm.)

on:
  push:
    branches: ["**"]
  schedule:
    - cron: "0 9 * * *"

jobs:
  gate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: brain lint
        run: python3 bin/brain lint
      - name: gitleaks
        run: |
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --no-banner --redact

  tests:
    # Lint proves the NOTES are well-formed; these prove the TOOLBELT works —
    # bootstrap on a clean clone, read containment, MCP survival.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: runtime tests
        run: python3 -m unittest discover -s tests -v

  pulse:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fail if no push in 3 days
        run: |
          last=$(git log -1 --format=%ct)
          age=$(( $(date +%s) - last ))
          echo "last commit: $(( age / 3600 ))h ago"
          if [ "$age" -gt 259200 ]; then
            echo "::error::No push in over 3 days — the brain's backup flow has stopped."
            exit 1
          fi
